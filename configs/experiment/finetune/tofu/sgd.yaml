# @package _global_
# Plain SGD finetuning for LMCleaner compatibility
# No momentum, no weight decay, constant LR — matches paper's SGD assumption

defaults:
  - override /model: Llama-3.2-1B-Instruct
  - override /trainer: finetune_sgd
  - override /data/datasets@data.train: TOFU_QA_full
  - override /eval: tofu

mode: finetune
trainer:
  args:
    learning_rate: 1e-5
    weight_decay: 0.0
    max_grad_norm: 0  # disable clipping so u[t] = -η·ḡ[t] exactly
    num_train_epochs: 5
    lr_scheduler_type: constant

forget_split: forget10
holdout_split: holdout10
retain_logs_path: null

eval:
  tofu:
    forget_split: ${forget_split}
    holdout_split: ${holdout_split}
    retain_logs_path: ${retain_logs_path}
    overwrite: true

task_name: tofu_sgd_Llama-3.2-1B-Instruct_full
