# @package eval.tofu.metrics.forget_prob_ks
defaults:
  - .@pre_compute.forget_Q_A_Prob: forget_Q_A_Prob

reference_logs:
  retain_model_logs:
    path: ${eval.tofu.retain_logs_path}
    include:
      forget_Q_A_Prob:
        access_key: retain

pre_compute:
  forget_Q_A_Prob:
    access_key: forget

handler: ks_test
value_key: prob
