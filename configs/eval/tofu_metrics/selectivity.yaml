# @package eval.tofu.metrics.selectivity
defaults:
  - .@pre_compute.forget_Q_A_Prob: forget_Q_A_Prob
  - .@pre_compute.retain_Q_A_Prob: retain_Q_A_Prob

reference_logs:
  baseline_model_logs:
    path: ${eval.tofu.original_logs_path}
    include:
      forget_Q_A_Prob:
        access_key: forget
      retain_Q_A_Prob:
        access_key: retain

pre_compute:
  forget_Q_A_Prob:
    access_key: forget
  retain_Q_A_Prob:
    access_key: retain

handler: selectivity
